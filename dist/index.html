<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>Змей</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <script type="module" crossorigin src="/assets/index-BLTkscJS.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BmfDCYjC.css">
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div class="titles">
            <div class="title">Змей</div>
            <div class="subtitle" id="subtitle">Текстурная змейка</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat__label">Счёт</div>
            <div class="stat__value" id="score">0</div>
          </div>
          <div class="stat">
            <div class="stat__label">Рекорд</div>
            <div class="stat__value" id="best">0</div>
          </div>
        </div>
      </header>

      <main class="stage">
        <div class="canvasWrap">
          <canvas id="game" width="720" height="720" aria-label="Поле игры"></canvas>
          <div class="overlay" id="overlay" hidden>
            <div class="card">
              <div class="card__title" id="overlayTitle">Змей</div>
              <div class="card__text" id="overlayText">
                Управление: стрелки / WASD / свайпы. Пауза: P или Пробел.
              </div>
              <div class="card__row">
                <button class="btn primary" id="btnStart">Играть</button>
                <button class="btn" id="btnResume" hidden>Продолжить</button>
              </div>
              <div class="card__row">
                <button class="btn primary" id="btnContinueAd" hidden>Продолжить за рекламу</button>
                <button class="btn ghost" id="btnRestart" hidden>Заново</button>
                <button class="btn ghost" id="btnShare" title="Поделиться результатом">Поделиться</button>
              </div>
              <div class="card__hint" id="hint">
                Совет: собирай «искры», но не врезайся в себя — у Змея нет тормозов.
              </div>
            </div>
          </div>
        </div>

        <section class="controls">
          <div class="controls__left">
            <button class="chip" id="btnPause" title="Пауза (P/Space)">Пауза</button>
            <button class="chip" id="btnSound" title="Звук">Звук: вкл</button>
          </div>
          <div class="dpad" aria-label="Кнопки направления">
            <button class="dpad__btn" data-dir="up">▲</button>
            <div class="dpad__row">
              <button class="dpad__btn" data-dir="left">◀</button>
              <button class="dpad__btn" data-dir="down">▼</button>
              <button class="dpad__btn" data-dir="right">▶</button>
            </div>
          </div>
          <div class="controls__right">
            <button class="chip" id="btnSpeed" title="Скорость">Скорость: 1×</button>
          </div>
        </section>
      </main>
    </div>

    <div class="bannerSpacer" id="bannerSpacer" aria-hidden="true"></div>

    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  </body>
</html>
